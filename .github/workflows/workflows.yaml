# Create a name
name: ci

# Trigger 
on:
  push:
    branches: [main]
  # pull_request:
  #   branches: [main]

# create a job
jobs:
  build:
    runs-on: ubuntu-latest, windows-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: Set up node.jobs
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: run ci
        run: npm ci

        name: run tests
        run: npm test
