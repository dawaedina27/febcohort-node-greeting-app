name: ci

on:
  push:
    branches: [main]
 
jobs:
  build:
    runs-on: ubuntu-latest, windows-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: run ci
        run: npm ci

        name: run tests
        run: npm test




  lint:
    runs-on: ubuntu-latest, windows-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24
        
      - name: run ci
        run: npm ci

        - name: linter
          run: npm run lint
